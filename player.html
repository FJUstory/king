<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cardValue = urlParams.get('v') || "派對歌神"; 
    document.getElementById('cardName').innerText = cardValue;

    const audio = document.getElementById("myAudio");

    // 這裡我們直接使用 encodeURIComponent 進行轉換
    // 這樣瀏覽器會把「派對歌神」轉換成標準的 URL 編碼 (如 %E6%B4%BE...)
    // 只要你的 GitHub 檔案真的叫「派對歌神.mp3」，這樣就能正確抓到
    const fileName = encodeURIComponent(cardValue);
    audio.src = fileName + ".mp3";

    // --- 以下保持你現有的功能 ---
    function triggerVibration() {
        if ("vibrate" in navigator) navigator.vibrate(50);
    }

    function updateDisplay() {
        if (!audio.paused) {
            document.querySelector('.sub-text').innerText = "── 正在播放 (" + audio.playbackRate.toFixed(2) + "x) ──";
        }
    }

    function changeSpeed(val) {
        audio.playbackRate = Math.min(Math.max(audio.playbackRate + val, 0.5), 2.0);
        triggerVibration();
        updateDisplay();
    }

    function resetSpeed() {
        audio.playbackRate = 1.0;
        triggerVibration();
        updateDisplay();
    }

    document.body.onclick = function(e) {
        if (e.target.tagName === 'BUTTON') return;
        if (audio.paused) {
            // 加入錯誤監聽，如果有錯會顯示在頁面上供你參考
            audio.play().catch(e => {
                console.error(e);
                alert("找不到檔案: " + cardValue + ".mp3，請確認檔案名稱是否完全一致 (包含空格或標點)。");
            });
            triggerVibration();
            updateDisplay();
        }
    };
</script>
