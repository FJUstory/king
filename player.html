<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派對歌神</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: black; color: yellow; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; touch-action: none;
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        .container { text-align: center; width: 100%; }
        .instruction { font-size: 3rem; font-weight: bold; }
        .sub-text { color: #aaa; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="instruction" id="cardName">讀取中...</div>
        <div class="sub-text" id="statusText">任意輕點 開啟共鳴</div>
    </div>
    <audio id="myAudio"></audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cardValue = urlParams.get('v') || "派對歌神"; 
        document.getElementById('cardName').innerText = cardValue;

        const audio = document.getElementById("myAudio");
        audio.src = encodeURIComponent(cardValue) + ".mp3";

        let startX = 0, startY = 0;
        let tapCount = 0;
        let tapTimer = null;

        function triggerVibration() {
            if ("vibrate" in navigator) navigator.vibrate(50);
        }

        document.body.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.body.addEventListener('touchend', (e) => {
            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;
            let diffX = endX - startX;
            let diffY = startY - endY; // 向上滑為正數

            // 判定滑動強度
            if (Math.abs(diffX) > 50 || Math.abs(diffY) > 50) {
                // 判斷是橫向還是縱向滑動
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 左右滑：控制速度
                    if (diffX > 0) audio.playbackRate = Math.min(audio.playbackRate + 0.25, 2.0);
                    else audio.playbackRate = Math.max(audio.playbackRate - 0.25, 0.5);
                    document.getElementById('statusText').innerText = "速度: " + audio.playbackRate.toFixed(2) + "x";
                } else {
                    // 上下滑：控制音量
                    if (diffY > 0) audio.volume = Math.min(audio.volume + 0.1, 1.0);
                    else audio.volume = Math.max(audio.volume - 0.1, 0.0);
                    document.getElementById('statusText').innerText = "音量: " + Math.round(audio.volume * 100) + "%";
                }
                triggerVibration();
            } else {
                // 點擊邏輯 (維持不變)
                tapCount++;
                if (tapCount === 1) {
                    tapTimer = setTimeout(() => {
                        if (audio.paused) { audio.play(); document.getElementById('statusText').innerText = "正在播放"; }
                        else { audio.pause(); document.getElementById('statusText').innerText = "已暫停"; }
                        tapCount = 0;
                    }, 300);
                } else if (tapCount === 2) {
                    clearTimeout(tapTimer);
                    audio.pause(); audio.currentTime = 0; 
                    document.getElementById('statusText').innerText = "已停止";
                    triggerVibration();
                    tapCount = 0;
                }
            }
        });
    </script>
</body>
</html>
