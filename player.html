<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派對歌神</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: black; color: yellow; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; overflow: hidden; 
            font-family: "Microsoft JhengHei", sans-serif; 
            touch-action: none; /* 關鍵：鎖定觸控操作 */
        }
        .container { text-align: center; padding: 20px; width: 100%; }
        .instruction { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }
        .sub-text { font-size: 1.2rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="instruction" id="cardName">讀取中...</div>
        <div class="sub-text" id="statusText">(向右滑加速 / 向左滑減速 / 雙擊停止)</div>
    </div>
    <audio id="myAudio"></audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cardValue = urlParams.get('v') || "派對歌神"; 
        document.getElementById('cardName').innerText = cardValue;

        const audio = document.getElementById("myAudio");
        audio.src = encodeURIComponent(cardValue) + ".mp3";

        let startX = 0;
        let lastTap = 0;

        function triggerVibration() {
            if ("vibrate" in navigator) navigator.vibrate(50);
        }

        // 觸控開始 (雙擊偵測)
        document.body.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            const now = new Date().getTime();
            if (now - lastTap < 300) {
                audio.pause();
                document.getElementById('statusText').innerText = "── 已停止 ──";
                triggerVibration();
            }
            lastTap = now;
        });

        // 觸控結束 (滑動控制)
        document.body.addEventListener('touchend', (e) => {
            let endX = e.changedTouches[0].clientX;
            let diff = endX - startX;

            if (Math.abs(diff) > 50) {
                if (diff > 0) { // 向右加速
                    audio.playbackRate = Math.min(audio.playbackRate + 0.25, 2.0);
                } else { // 向左減速
                    audio.playbackRate = Math.max(audio.playbackRate - 0.25, 0.5);
                }
                triggerVibration();
                document.getElementById('statusText').innerText = "── 倍率: " + audio.playbackRate.toFixed(2) + "x ──";
            }
        });

        // 啟動點擊
        document.body.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => alert("無法播放，請檢查檔案名稱。"));
                document.getElementById('statusText').innerText = "── 正在播放 ──";
            }
        });
    </script>
</body>
</html>
