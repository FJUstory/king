<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派對歌神</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: black; color: yellow; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; overflow: hidden; 
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        .container { text-align: center; padding: 20px; max-width: 90%; }
        .instruction { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; word-wrap: break-word;}
        .sub-text { font-size: 1.2rem; color: #aaa; margin-top: 10px; display: block;}
        .controls { margin-top: 20px; }
        button { 
            background: transparent; border: 1px solid yellow; color: yellow; 
            padding: 10px 20px; cursor: pointer; font-size: 1rem; margin: 0 10px;
        }
        button:hover { background: yellow; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <div class="instruction"><span id="cardName">讀取中...</span></div>
        <div class="sub-text">(任意輕點 啟動說明)</div>
        
        <div class="controls">
            <button onclick="changeSpeed(-0.25)">變慢</button>
            <button onclick="resetSpeed()">原速</button>
            <button onclick="changeSpeed(0.25)">變快</button>
        </div>
    </div>
    <audio id="myAudio"></audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cardValue = urlParams.get('v') || "派對歌神"; 
        document.getElementById('cardName').innerText = cardValue;

        const audio = document.getElementById("myAudio");
        audio.src = encodeURI(cardValue + ".mp3");

        function updateDisplay() {
            if (!audio.paused) {
                document.querySelector('.sub-text').innerText = "── 正在播放 (" + audio.playbackRate.toFixed(2) + "x) ──";
            }
        }

        function changeSpeed(val) {
            audio.playbackRate = Math.min(Math.max(audio.playbackRate + val, 0.5), 2.0);
            updateDisplay();
        }
        function resetSpeed() {
            audio.playbackRate = 1.0;
            updateDisplay();
        }

        document.body.onclick = function() {
            if (audio.paused) {
                audio.play().catch(e => alert("找不到檔案，請確認檔名。"));
                updateDisplay();
            }
        };
    </script>
</body>
</html>
