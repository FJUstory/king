<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派對歌神</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: black; color: yellow; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; touch-action: none;
            font-family: "Microsoft JhengHei", sans-serif; 
        }
        .container { text-align: center; width: 100%; }
        .instruction { font-size: 3rem; font-weight: bold; }
        .sub-text { color: #aaa; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="instruction" id="cardName">讀取中...</div>
        <div class="sub-text" id="statusText">任意輕點 開啟共鳴</div>
    </div>
    <audio id="myAudio"></audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cardValue = urlParams.get('v') || "派對歌神"; 
        document.getElementById('cardName').innerText = cardValue;

        const audio = document.getElementById("myAudio");
        audio.src = encodeURIComponent(cardValue) + ".mp3";

        let startX = 0;
        let lastTap = 0;

        function triggerVibration() {
            if ("vibrate" in navigator) navigator.vibrate(50);
        }

        // 監聽點擊/觸控
        document.body.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            
            const now = new Date().getTime();
            if (now - lastTap < 300) {
                // 這是雙擊
                audio.pause();
                document.getElementById('statusText').innerText = "已停止";
                triggerVibration();
                e.preventDefault(); // 阻止後續事件
            }
            lastTap = now;
        }, {passive: false});

        document.body.addEventListener('touchend', (e) => {
            let endX = e.changedTouches[0].clientX;
            let diff = endX - startX;

            // 如果滑動距離夠大，判定為調整速度
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    audio.playbackRate = Math.min(audio.playbackRate + 0.25, 2.0);
                } else {
                    audio.playbackRate = Math.max(audio.playbackRate - 0.25, 0.5);
                }
                triggerVibration();
                document.getElementById('statusText').innerText = "倍率: " + audio.playbackRate.toFixed(2) + "x";
            } else {
                // 如果只是輕點且沒在滑動
                if (audio.paused) {
                    audio.play().catch(e => console.log("等待播放"));
                    document.getElementById('statusText').innerText = "正在播放";
                }
            }
        });
    </script>
</body>
</html>
